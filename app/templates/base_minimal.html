<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stock Analysis{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fff;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 顶部导航 */
        .nav {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            border-bottom: 1px solid #e5e5e5;
            background: #fff;
        }

        .nav-brand {
            font-weight: 600;
            font-size: 15px;
            margin-right: 32px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            color: #666;
            font-size: 14px;
        }

        .nav-links a.active {
            color: #1a1a1a;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #1a1a1a;
            text-decoration: none;
        }

        /* 主内容区 */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* 简洁表格 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e5e5e5;
        }

        th {
            font-weight: 500;
            color: #666;
            background: #fafafa;
        }

        tr:hover {
            background: #fafafa;
        }

        /* 简洁表单 */
        input, select, button {
            font-size: 14px;
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #0066cc;
        }

        button {
            background: #1a1a1a;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        button.secondary {
            background: #fff;
            color: #1a1a1a;
            border: 1px solid #d9d9d9;
        }

        button.secondary:hover {
            background: #f5f5f5;
        }

        /* 简洁卡片 - 只保留边框 */
        .card {
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        /* 简单标签 */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 3px;
            background: #f0f0f0;
            color: #666;
        }

        .badge.red { background: #fee; color: #c00; }
        .badge.green { background: #efe; color: #0a0; }

        /* 简单loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* 简单错误提示 */
        .error {
            padding: 12px 16px;
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        /* 简单分隔线 */
        .divider {
            border: none;
            border-top: 1px solid #e5e5e5;
            margin: 24px 0;
        }

        /* 简单网格 */
        .grid {
            display: grid;
            gap: 16px;
        }

        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav {
                padding: 10px 16px;
            }

            .nav-links {
                gap: 16px;
            }

            .nav-links a {
                font-size: 13px;
            }

            .main {
                padding: 16px;
            }

            .grid-2, .grid-3, .grid-4 {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 13px;
            }

            th, td {
                padding: 8px;
            }
        }

        /* 图表容器 */
        .chart {
            width: 100%;
            height: 400px;
            margin: 16px 0;
        }

        /* 简单统计数字 */
        .stat {
            font-size: 24px;
            font-weight: 600;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }

        /* 简单列表 */
        .list {
            list-style: none;
        }

        .list li {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .list li:last-child {
            border-bottom: none;
        }

        /* 内页导航链接 */
        .nav-link {
            display: inline-block;
            padding: 6px 12px;
            font-size: 13px;
            color: #666;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            background: #fff;
        }

        .nav-link:hover {
            background: #f5f5f5;
            color: #1a1a1a;
            text-decoration: none;
        }

        .nav-link.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="nav">
        <a href="{{ url_for('main.index') }}" class="nav-brand">量化分析</a>
        <div class="nav-links">
            <a href="{{ url_for('main.stocks') }}">股票</a>
            <a href="{{ url_for('main.analysis') }}">分析</a>
            <a href="{{ url_for('main.screen') }}">筛选</a>
            <a href="/ml-factor">因子</a>
            <a href="/realtime-analysis">实时</a>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <!-- 简单JS -->
    <script>
        async function apiRequest(url, options = {}) {
            try {
                const response = await fetch(`/api${url}`, {
                    method: options.method || 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    body: options.data ? JSON.stringify(options.data) : undefined
                });
                return response.json();
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        function showLoading(containerId) {
            const el = document.getElementById(containerId);
            if (el) el.innerHTML = '<div class="loading">Loading...</div>';
        }

        function showError(containerId, message) {
            const el = document.getElementById(containerId);
            if (el) el.innerHTML = `<div class="error">${message}</div>`;
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
