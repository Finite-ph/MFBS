{% extends "base_minimal.html" %}

{% block title %}因子管理{% endblock %}

{% block content %}
<div style="margin-bottom: 24px;">
    <h1 style="font-size: 18px; font-weight: 600;">因子管理</h1>
    <p style="color: #666; font-size: 13px;">总计: <span id="total-count">--</span> 个因子</p>
</div>

<!-- Navigation -->
<div class="card" style="margin-bottom: 20px;">
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <a href="/ml-factor/" class="nav-link active">因子</a>
        <a href="/ml-factor/models" class="nav-link">模型</a>
        <a href="/ml-factor/scoring" class="nav-link">评分</a>
        <a href="/ml-factor/portfolio" class="nav-link">组合</a>
        <a href="/ml-factor/analysis" class="nav-link">分析</a>
        <a href="/ml-factor/backtest" class="nav-link">回测</a>
    </div>
</div>

<!-- Filters -->
<div class="card" style="margin-bottom: 20px;">
    <form id="filter-form" style="display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;">
        <div>
            <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">类型</label>
            <select id="type-filter" style="width: 120px;">
                <option value="">全部</option>
                <option value="technical">技术因子</option>
                <option value="fundamental">基本面因子</option>
                <option value="money_flow">资金流因子</option>
                <option value="chip">筹码因子</option>
            </select>
        </div>
        <div>
            <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">搜索</label>
            <input type="text" id="search-input" placeholder="因子ID或名称" style="width: 150px;">
        </div>
        <button type="submit">筛选</button>
        <button type="button" class="secondary" id="reset-btn">重置</button>
    </form>
</div>

<!-- Factor List -->
<div id="factors-container">
    <div class="loading">加载中...</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let allFactors = [];

document.addEventListener('DOMContentLoaded', function() {
    loadFactors();

    document.getElementById('filter-form').addEventListener('submit', function(e) {
        e.preventDefault();
        filterFactors();
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
        document.getElementById('type-filter').value = '';
        document.getElementById('search-input').value = '';
        renderFactors(allFactors);
    });
});

async function loadFactors() {
    try {
        const res = await apiRequest('/ml-factor/factors/list');
        if (res.success) {
            allFactors = res.factors || [];
            document.getElementById('total-count').textContent = allFactors.length;
            renderFactors(allFactors);
        } else {
            showError('factors-container', '加载因子失败');
        }
    } catch (error) {
        showError('factors-container', '加载因子失败');
    }
}

function filterFactors() {
    const typeFilter = document.getElementById('type-filter').value;
    const search = document.getElementById('search-input').value.toLowerCase();

    const filtered = allFactors.filter(f => {
        if (typeFilter && f.factor_type !== typeFilter) return false;
        if (search && !f.factor_id.toLowerCase().includes(search) && !f.factor_name.toLowerCase().includes(search)) return false;
        return true;
    });

    renderFactors(filtered);
}

function renderFactors(factors) {
    const container = document.getElementById('factors-container');

    if (factors.length === 0) {
        container.innerHTML = '<div class="error">未找到因子</div>';
        return;
    }

    let html = `
        <table>
            <thead>
                <tr>
                    <th>因子ID</th>
                    <th>名称</th>
                    <th>类型</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody>
    `;

    factors.forEach(f => {
        html += `
            <tr>
                <td><code>${f.factor_id}</code></td>
                <td>${f.factor_name}</td>
                <td>${f.factor_type}</td>
                <td>${f.is_active !== false ? '启用' : '禁用'}</td>
            </tr>
        `;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
}
</script>
{% endblock %}
