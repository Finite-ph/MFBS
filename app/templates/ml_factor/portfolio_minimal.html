{% extends "base_minimal.html" %}

{% block title %}组合管理{% endblock %}

{% block content %}
<div style="margin-bottom: 24px;">
    <h1 style="font-size: 18px; font-weight: 600;">组合管理</h1>
    <p style="color: #666; font-size: 13px;">组合优化与管理系统</p>
</div>

<!-- Optimize Form -->
<div class="card" style="margin-bottom: 20px;">
    <form id="optimize-form" style="display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;">
        <div>
            <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">方法</label>
            <select id="method-select" style="width: 150px;">
                <option value="mean_variance">均值方差</option>
                <option value="risk_parity">风险平价</option>
                <option value="max_sharpe">最大夏普</option>
                <option value="min_variance">最小方差</option>
            </select>
        </div>
        <div>
            <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">风险等级</label>
            <select id="risk-level" style="width: 120px;">
                <option value="conservative">保守</option>
                <option value="moderate">稳健</option>
                <option value="aggressive">激进</option>
            </select>
        </div>
        <div>
            <label style="display: block; font-size: 12px; color: #666; margin-bottom: 4px;">最大股票数</label>
            <input type="number" id="max-stocks" value="20" style="width: 80px;">
        </div>
        <button type="submit">优化</button>
    </form>
</div>

<!-- Portfolio List -->
<div class="card">
    <div style="font-size: 14px; font-weight: 500; margin-bottom: 12px;">我的组合</div>
    <div id="portfolio-list">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let portfolios = [
    {id: 'p001', name: '价值组合', return_rate: 0.15, sharpe_ratio: 1.25, status: 'active'},
    {id: 'p002', name: '成长组合', return_rate: 0.16, sharpe_ratio: 0.89, status: 'active'}
];

document.addEventListener('DOMContentLoaded', function() {
    renderPortfolios();

    document.getElementById('optimize-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const method = document.getElementById('method-select').value;
        const maxStocks = document.getElementById('max-stocks').value;

        showLoading('portfolio-list');

        try {
            const res = await apiRequest('/ml-factor/portfolio/integrated-selection', {
                method: 'POST',
                data: {
                    trade_date: '2025-05-23',
                    selection_method: 'factor_based',
                    top_n: parseInt(maxStocks),
                    optimization_method: method
                }
            });

            if (res.success) {
                const newPortfolio = {
                    id: 'p' + Date.now(),
                    name: `${method}_${new Date().toISOString().split('T')[0]}`,
                    return_rate: res.portfolio_optimization?.portfolio_stats?.expected_return || 0,
                    sharpe_ratio: res.portfolio_optimization?.portfolio_stats?.sharpe_ratio || 0,
                    status: 'active'
                };
                portfolios.push(newPortfolio);
                renderPortfolios();
            } else {
                showError('portfolio-list', '优化失败');
            }
        } catch (error) {
            showError('portfolio-list', '优化失败');
        }
    });
});

function renderPortfolios() {
    const container = document.getElementById('portfolio-list');

    if (portfolios.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">无组合</div>';
        return;
    }

    let html = `
        <table>
            <thead>
                <tr>
                    <th>名称</th>
                    <th>收益率</th>
                    <th>夏普比率</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody>
    `;

    portfolios.forEach(p => {
        const returnColor = p.return_rate >= 0 ? '#c00' : '#0a0';
        html += `
            <tr>
                <td>${p.name}</td>
                <td style="color: ${returnColor}">${(p.return_rate * 100).toFixed(2)}%</td>
                <td>${p.sharpe_ratio.toFixed(2)}</td>
                <td>${p.status}</td>
            </tr>
        `;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
}
</script>
{% endblock %}
