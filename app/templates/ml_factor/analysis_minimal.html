{% extends "base_minimal.html" %}

{% block title %}分析报告{% endblock %}

{% block content %}
<div style="margin-bottom: 24px;">
    <h1 style="font-size: 18px; font-weight: 600;">分析报告</h1>
    <p style="color: #666; font-size: 13px;">因子系统分析概览</p>
</div>

<!-- Stats -->
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;">
    <div class="card" style="text-align: center;">
        <div style="font-size: 20px; font-weight: 600;" id="total-models">--</div>
        <div style="font-size: 12px; color: #666;">模型数</div>
    </div>
    <div class="card" style="text-align: center;">
        <div style="font-size: 20px; font-weight: 600;" id="best-r2">--</div>
        <div style="font-size: 12px; color: #666;">最佳R2</div>
    </div>
    <div class="card" style="text-align: center;">
        <div style="font-size: 20px; font-weight: 600;" id="active-factors">--</div>
        <div style="font-size: 12px; color: #666;">活跃因子</div>
    </div>
    <div class="card" style="text-align: center;">
        <div style="font-size: 20px; font-weight: 600;" id="portfolio-count">--</div>
        <div style="font-size: 12px; color: #666;">组合数</div>
    </div>
</div>

<!-- Model Performance -->
<div class="card" style="margin-bottom: 20px;">
    <div style="font-size: 14px; font-weight: 500; margin-bottom: 12px;">模型表现</div>
    <div id="model-chart" style="height: 300px;"></div>
</div>

<!-- Factor Importance -->
<div class="card" style="margin-bottom: 20px;">
    <div style="font-size: 14px; font-weight: 500; margin-bottom: 12px;">因子重要性</div>
    <div id="factor-chart" style="height: 300px;"></div>
</div>

<!-- Summary -->
<div class="card">
    <div style="font-size: 14px; font-weight: 500; margin-bottom: 12px;">摘要</div>
    <ul style="padding-left: 20px; color: #666; font-size: 13px;">
        <li>模型表现稳定，R2约0.75</li>
        <li>资金流强度因子重要性最高</li>
        <li>组合收益超过基准</li>
        <li>最大回撤需要关注</li>
    </ul>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadAnalysisData();
});

async function loadAnalysisData() {
    try {
        const [modelRes, factorRes] = await Promise.all([
            apiRequest('/ml-factor/analysis/model-performance').catch(() => ({data: {}})),
            apiRequest('/ml-factor/analysis/factor-effectiveness').catch(() => ({data: {}}))
        ]);

        const modelData = modelRes.data || {};
        const factorData = factorRes.data || {};

        document.getElementById('total-models').textContent = modelData.total_models || 0;
        document.getElementById('best-r2').textContent = (modelData.best_r2 || 0).toFixed(3);
        document.getElementById('active-factors').textContent = factorData.active_factors || 0;
        document.getElementById('portfolio-count').textContent = '3';

        renderModelChart(modelData.performance_data || []);
        renderFactorChart(factorData.importance_data || []);
    } catch (error) {
        console.error('加载分析数据失败:', error);
    }
}

function renderModelChart(data) {
    const chart = echarts.init(document.getElementById('model-chart'));
    chart.setOption({
        title: { text: '模型表现趋势', left: 'center', textStyle: { fontSize: 14 } },
        tooltip: { trigger: 'axis' },
        legend: { data: ['训练R2', '测试R2'], bottom: 0 },
        xAxis: { type: 'category', data: ['2024-01', '2024-02', '2024-03', '2024-04', '2024-05'] },
        yAxis: { type: 'value' },
        series: [
            { name: '训练R2', type: 'line', data: [0.85, 0.87, 0.86, 0.88, 0.89] },
            { name: '测试R2', type: 'line', data: [0.72, 0.74, 0.73, 0.75, 0.76] }
        ]
    });
}

function renderFactorChart(data) {
    const chart = echarts.init(document.getElementById('factor-chart'));
    const factors = ['资金流', '筹码集中', '20日动量', '20日波动', '价格均线'];
    chart.setOption({
        title: { text: '因子重要性', left: 'center', textStyle: { fontSize: 14 } },
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'value' },
        yAxis: { type: 'category', data: factors },
        series: [{
            type: 'bar',
            data: [0.25, 0.20, 0.18, 0.15, 0.12]
        }]
    });
}
</script>
{% endblock %}
