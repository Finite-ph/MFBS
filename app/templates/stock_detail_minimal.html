{% extends "base_minimal.html" %}

{% block title %}{{ ts_code }} - 股票详情{% endblock %}

{% block content %}
<div style="margin-bottom: 24px;">
    <h1 style="font-size: 18px; font-weight: 600;" id="stock-name">加载中...</h1>
    <p style="color: #666; font-size: 13px;">代码: <span id="stock-code">{{ ts_code }}</span></p>
</div>

<!-- 标签页 -->
<div style="border-bottom: 1px solid #e5e5e5; margin-bottom: 20px;">
    <button class="tab-btn active" data-tab="history">历史行情</button>
    <button class="tab-btn" data-tab="factors">技术指标</button>
    <button class="tab-btn" data-tab="moneyflow">资金流向</button>
    <button class="tab-btn" data-tab="cyq">筹码分布</button>
</div>

<!-- 历史行情 -->
<div id="tab-history" class="tab-content">
    <div style="margin-bottom: 12px;">
        <button onclick="loadHistory(30)">30天</button>
        <button onclick="loadHistory(60)">60天</button>
        <button onclick="loadHistory(120)">120天</button>
    </div>
    <div id="history-content">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
    </div>
</div>

<!-- 技术指标 -->
<div id="tab-factors" class="tab-content" style="display: none;">
    <div id="factors-content">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
    </div>
</div>

<!-- 资金流向 -->
<div id="tab-moneyflow" class="tab-content" style="display: none;">
    <div id="moneyflow-content">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
    </div>
</div>

<!-- 筹码分布 -->
<div id="tab-cyq" class="tab-content" style="display: none;">
    <div id="cyq-content">
        <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.tab-btn {
    border: none;
    background: none;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
    color: #666;
    border-bottom: 2px solid transparent;
}
.tab-btn.active {
    color: #1a1a1a;
    border-bottom-color: #1a1a1a;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
const tsCode = '{{ ts_code }}';

document.addEventListener('DOMContentLoaded', function() {
    loadStockInfo();
    loadHistory(60);

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            this.classList.add('active');
            document.getElementById('tab-' + this.dataset.tab).style.display = 'block';
        });
    });
});

async function loadStockInfo() {
    try {
        const res = await apiRequest(`/stocks/${tsCode}`);
        if (res.code === 200) {
            document.getElementById('stock-name').textContent = res.data.name || tsCode;
        }
    } catch (error) {
        console.error('加载股票信息失败:', error);
    }
}

async function loadHistory(days) {
    const container = document.getElementById('history-content');
    container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">加载中...</div>';

    try {
        const res = await apiRequest(`/stocks/${tsCode}/history?limit=${days}`);
        if (res.code === 200 && res.data.length > 0) {
            renderHistoryData(res.data);
        } else {
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无数据</div>';
        }
    } catch (error) {
        container.innerHTML = '<div class="error">加载数据失败</div>';
    }
}

function renderHistoryData(data) {
    const container = document.getElementById('history-content');
    const reversed = [...data].reverse();

    let html = `
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>开盘</th>
                    <th>最高</th>
                    <th>最低</th>
                    <th>收盘</th>
                    <th>成交量</th>
                    <th>成交额</th>
                    <th>涨跌幅</th>
                </tr>
            </thead>
            <tbody>
    `;

    reversed.slice(0, 20).forEach(item => {
        const change = item.pct_chg || 0;
        const color = change >= 0 ? '#c00' : '#0a0';
        html += `
            <tr>
                <td>${item.trade_date}</td>
                <td>${item.open}</td>
                <td>${item.high}</td>
                <td>${item.low}</td>
                <td><strong>${item.close}</strong></td>
                <td>${(item.vol / 10000).toFixed(1)}万</td>
                <td>${(item.amount / 100000000).toFixed(2)}亿</td>
                <td style="color: ${color}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</td>
            </tr>
        `;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
}
</script>
{% endblock %}
