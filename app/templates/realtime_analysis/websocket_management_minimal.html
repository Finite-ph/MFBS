{% extends "base_minimal.html" %}

{% block title %}WebSocket管理{% endblock %}

{% block content %}
<div style="margin-bottom: 24px;">
    <h1 style="font-size: 18px; font-weight: 600;">WebSocket管理</h1>
    <p style="color: #666; font-size: 13px;">实时数据推送服务管理</p>
</div>

<!-- Connection Status -->
<div class="card" style="margin-bottom: 20px;">
    <div style="font-size: 14px; font-weight: 500; margin-bottom: 12px;">连接状态</div>
    <div style="display: flex; gap: 16px; align-items: center; margin-bottom: 16px;">
        <span id="connection-status" style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ccc;"></span>
        <span id="connection-text">未连接</span>
        <button id="connect-btn" onclick="connectWebSocket()" style="margin-left: 12px;">连接</button>
        <button id="disconnect-btn" onclick="disconnectWebSocket()" disabled>断开</button>
    </div>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
        <div style="text-align: center; padding: 12px; border: 1px solid #e5e5e5;">
            <div style="font-size: 18px; font-weight: 600;" id="total-clients">0</div>
            <div style="font-size: 12px; color: #666;">在线客户端</div>
        </div>
        <div style="text-align: center; padding: 12px; border: 1px solid #e5e5e5;">
            <div style="font-size: 18px; font-weight: 600;" id="total-rooms">0</div>
            <div style="font-size: 12px; color: #666;">活跃房间</div>
        </div>
        <div style="text-align: center; padding: 12px; border: 1px solid #e5e5e5;">
            <div style="font-size: 18px; font-weight: 600;" id="push-status">已停止</div>
            <div style="font-size: 12px; color: #666;">推送状态</div>
        </div>
        <div style="text-align: center; padding: 12px; border: 1px solid #e5e5e5;">
            <div style="font-size: 18px; font-weight: 600;" id="message-count">0</div>
            <div style="font-size: 12px; color: #666;">消息计数</div>
        </div>
    </div>
</div>

<!-- Main Content -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <!-- Push Config -->
    <div>
        <div class="card" style="margin-bottom: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div style="font-size: 14px; font-weight: 500;">推送配置</div>
                <div style="display: flex; gap: 8px;">
                    <button class="secondary" onclick="startPushService()">启动推送</button>
                    <button class="secondary" onclick="stopPushService()">停止推送</button>
                </div>
            </div>
            <div id="push-config-container">
                <div style="padding: 12px; border: 1px solid #e5e5e5; margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>市场数据</span>
                        <input type="checkbox" checked>
                    </div>
                </div>
                <div style="padding: 12px; border: 1px solid #e5e5e5; margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>技术指标</span>
                        <input type="checkbox" checked>
                    </div>
                </div>
                <div style="padding: 12px; border: 1px solid #e5e5e5;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>交易信号</span>
                        <input type="checkbox" checked>
                    </div>
                </div>
            </div>
            <div style="margin-top: 12px;">
                <button onclick="updatePushConfig()">保存配置</button>
            </div>
        </div>

        <!-- Subscription -->
        <div class="card">
            <div style="font-size: 14px; font-weight: 500; margin-bottom: 12px;">订阅管理</div>
            <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                <select id="subscription-type" style="flex: 1;">
                    <option value="">选择类型</option>
                    <option value="market_data">市场数据</option>
                    <option value="indicators">技术指标</option>
                    <option value="signals">交易信号</option>
                    <option value="monitor">实时监控</option>
                    <option value="risk_alerts">风险预警</option>
                </select>
                <input type="text" id="subscription-symbol" placeholder="股票代码(可选)" style="flex: 1;">
            </div>
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <button onclick="subscribe()">订阅</button>
                <button class="secondary" onclick="unsubscribe()">取消订阅</button>
                <button class="secondary" onclick="testConnection()">测试</button>
            </div>
            <div>
                <div style="font-size: 12px; color: #666; margin-bottom: 4px;">当前订阅:</div>
                <div id="current-subscriptions" style="font-size: 13px; color: #999;">无</div>
            </div>
        </div>
    </div>

    <!-- Real-time Data & Logs -->
    <div>
        <div class="card" style="margin-bottom: 16px;">
            <div style="font-size: 14px; font-weight: 500; margin-bottom: 12px;">实时数据</div>
            <div id="real-time-data" style="height: 200px; overflow-y: auto; padding: 12px; border: 1px solid #e5e5e5; background: #fafafa;">
                <div style="text-align: center; padding: 40px; color: #999;">等待数据...</div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div style="font-size: 14px; font-weight: 500;">消息日志</div>
                <button class="secondary" onclick="clearMessageLog()" style="font-size: 12px; padding: 4px 8px;">清空</button>
            </div>
            <div id="message-log" style="height: 200px; overflow-y: auto; padding: 12px; border: 1px solid #e5e5e5; background: #fafafa; font-family: monospace; font-size: 12px;">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
<script>
let socket = null;
let messageCount = 0;
let currentSubscriptions = new Set();

function connectWebSocket() {
    if (socket && socket.connected) {
        addMessage('warning', '已连接');
        return;
    }

    try {
        socket = io('http://127.0.0.1:5001', {
            transports: ['websocket', 'polling']
        });

        socket.on('connect', function() {
            updateConnectionStatus(true);
            addMessage('success', '连接成功');
        });

        socket.on('disconnect', function() {
            updateConnectionStatus(false);
            addMessage('error', '连接断开');
        });

        socket.on('market_data_update', function(data) {
            addMessage('info', '行情: ' + data.symbol);
            messageCount++;
            updateMessageCount();
        });

        socket.on('indicators_update', function(data) {
            addMessage('info', '指标: ' + data.symbol);
            messageCount++;
            updateMessageCount();
        });

        socket.on('signals_update', function(data) {
            addMessage('info', '信号: ' + data.symbol);
            messageCount++;
            updateMessageCount();
        });

    } catch (error) {
        addMessage('error', '连接失败: ' + error.message);
    }
}

function disconnectWebSocket() {
    if (socket) {
        socket.disconnect();
        socket = null;
        updateConnectionStatus(false);
        addMessage('info', '已断开');
    }
}

function updateConnectionStatus(connected) {
    document.getElementById('connection-status').style.background = connected ? '#0a0' : '#ccc';
    document.getElementById('connection-text').textContent = connected ? '已连接' : '未连接';
    document.getElementById('connect-btn').disabled = connected;
    document.getElementById('disconnect-btn').disabled = !connected;
}

function subscribe() {
    if (!socket || !socket.connected) {
        addMessage('error', '请先连接');
        return;
    }
    const type = document.getElementById('subscription-type').value;
    if (!type) {
        addMessage('error', '请选择类型');
        return;
    }
    socket.emit('subscribe', { type: type, params: {} });
    addMessage('info', '已订阅: ' + type);
}

function unsubscribe() {
    if (!socket || !socket.connected) return;
    const type = document.getElementById('subscription-type').value;
    if (!type) return;
    socket.emit('unsubscribe', { type: type, params: {} });
    addMessage('info', '已取消订阅: ' + type);
}

function testConnection() {
    if (!socket || !socket.connected) {
        addMessage('error', '请先连接');
        return;
    }
    socket.emit('ping');
    addMessage('info', '心跳已发送');
}

function startPushService() {
    fetch('/api/websocket/start', { method: 'POST' })
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                document.getElementById('push-status').textContent = '运行中';
                addMessage('success', '推送服务已启动');
            }
        });
}

function stopPushService() {
    fetch('/api/websocket/stop', { method: 'POST' })
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                document.getElementById('push-status').textContent = '已停止';
                addMessage('info', '推送服务已停止');
            }
        });
}

function updatePushConfig() {
    addMessage('info', '配置已保存');
}

function updateMessageCount() {
    document.getElementById('message-count').textContent = messageCount;
}

function addMessage(type, message) {
    const log = document.getElementById('message-log');
    const time = new Date().toLocaleTimeString();
    const colors = { info: '#0066cc', success: '#0a0', error: '#c00', warning: '#fa0' };
    const div = document.createElement('div');
    div.style.marginBottom = '4px';
    div.style.color = colors[type] || '#666';
    div.textContent = '[' + time + '] ' + message;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}

function clearMessageLog() {
    document.getElementById('message-log').innerHTML = '';
    messageCount = 0;
    updateMessageCount();
}

// Load initial stats
document.addEventListener('DOMContentLoaded', function() {
    loadConnectionStats();
    setInterval(loadConnectionStats, 10000);
});

function loadConnectionStats() {
    fetch('/api/websocket/connections')
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                document.getElementById('total-clients').textContent = d.data.total_clients || 0;
                document.getElementById('total-rooms').textContent = d.data.total_rooms || 0;
            }
        });
}
</script>
{% endblock %}
